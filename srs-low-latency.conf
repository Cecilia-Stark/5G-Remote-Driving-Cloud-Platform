# SRS 低延迟优化配置
# 用于 WebRTC 实时视频流

listen              1935;
max_connections     1000;
daemon              off;
srs_log_level       info;
srs_log_tank        console;

# WebRTC 配置
rtc {
    enabled         on;
    listen          8000;
    protocol        udp;
    nack            on;
    twcc            on;
    rtp_extension   on;
    recv_buffer_size 500000000;
}

vhost __defaultVhost__ {
    # 关闭 GOP 缓存降低延迟
    gop_cache       off;
    
    # 队列长度
    queue_length    30;
    
    # 转 WebRTC
    rtc {
        enabled     on;
        nack        on;
        twcc        on;
    }
    
    # 低延迟优化
    hls {
        enabled     off;
    }
    
    dvr {
        enabled     off;
    }
}

