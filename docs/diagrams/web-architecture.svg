  <text x="820" y="438" text-anchor="middle" font-size="9" fill="#666">g29-server.cjs</text>
  <text x="820" y="450" text-anchor="middle" font-size="9" fill="#666">WebSocket:8080</text>
  
  <rect x="915" y="400" width="150" height="50" rx="5" fill="#f8bbd9" stroke="#c2185b"/>
  <text x="990" y="420" text-anchor="middle" font-size="11" fill="#333">🗺️ 百度地图 API</text>
  <text x="990" y="438" text-anchor="middle" font-size="9" fill="#666">GL JS SDK</text>
  <text x="990" y="450" text-anchor="middle" font-size="9" fill="#666">index.html 引入</text>
  
  <rect x="830" y="470" width="150" height="50" rx="5" fill="#f8bbd9" stroke="#c2185b"/>
  <text x="905" y="490" text-anchor="middle" font-size="11" fill="#333">💾 LocalStorage</text>
  <text x="905" y="508" text-anchor="middle" font-size="9" fill="#666">小车 IP 配置</text>
  <text x="905" y="520" text-anchor="middle" font-size="9" fill="#666">历史接管记录</text>
  
