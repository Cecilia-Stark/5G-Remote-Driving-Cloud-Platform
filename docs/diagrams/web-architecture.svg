  <text x="820" y="368" text-anchor="middle" font-size="9" fill="#666">robot_web_control.py</text>
  <text x="820" y="380" text-anchor="middle" font-size="9" fill="#666">端口:8000/mjpeg</text>
  
  <rect x="915" y="330" width="150" height="50" rx="5" fill="#f8bbd9" stroke="#c2185b"/>
  <text x="990" y="350" text-anchor="middle" font-size="11" fill="#333">🔄 视频流代理</text>
  <text x="990" y="368" text-anchor="middle" font-size="9" fill="#666">video-proxy-lowlatency</text>
  <text x="990" y="380" text-anchor="middle" font-size="9" fill="#666">端口:8001</text>
  
  <rect x="745" y="400" width="150" height="50" rx="5" fill="#f8bbd9" stroke="#c2185b"/>
